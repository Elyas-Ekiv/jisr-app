name: jisr

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jisr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-jisr_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - jisr

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-jisr}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jisr_db}?schema=public
      UPLOAD_DIR: /app/uploads
      TRUST_PROXY: 'true'
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      RUN_SEED: ${RUN_SEED:-false}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:$${PORT:-3000}/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - jisr

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - jisr

volumes:
  postgres_data:
  uploads_data:

networks:
  jisr:
    driver: bridge
